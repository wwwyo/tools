<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tools</title>
<link rel="stylesheet" href="./global.css">
<style>
  :root {
    color-scheme: light;
    --bg: #FBFAF6;
    --ink: #1F1B16;
    --red: #C73E2E;
    --rule: rgba(31, 27, 22, 0.16);
    --muted: #8C857B;
  }
  html, body {
    background: var(--bg);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Segoe UI", sans-serif;
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    color: var(--ink);
    line-height: 1.8;
  }
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 56px;
  }
  .title {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  h1 {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
    font-weight: 700;
    letter-spacing: 0.04em;
    font-size: 2.4rem;
    margin: 0;
  }
  .accent {
    color: var(--red);
    font-size: 1.1rem;
    font-weight: 400;
  }
  .gh-link {
    color: var(--ink);
    display: inline-flex;
    padding: 4px;
    line-height: 0;
    transition: color 0.15s ease;
  }
  .gh-link:hover {
    color: var(--red);
  }
  .gh-link:focus-visible {
    outline: 2px solid var(--red);
    outline-offset: 3px;
    border-radius: 2px;
  }
  ul.tool-list {
    list-style: none;
    padding: 0;
    margin: 0;
    border-top: 1px solid var(--rule);
  }
  ul.tool-list li {
    border-bottom: 1px solid var(--rule);
  }
  ul.tool-list a {
    display: block;
    padding: 22px 4px;
    text-decoration: none;
    color: inherit;
  }
  .no {
    display: block;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: var(--red);
    margin-bottom: 6px;
  }
  .name {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--ink);
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s ease;
  }
  ul.tool-list a:hover .name,
  ul.tool-list a:focus-visible .name {
    border-bottom-color: var(--red);
  }
  ul.tool-list a:focus-visible {
    outline: 2px solid var(--red);
    outline-offset: -2px;
  }
  .desc {
    margin: 6px 0 0;
    font-size: 0.85rem;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <div class="title">
    <h1>tools</h1>
    <span class="accent" aria-hidden="true">×</span>
  </div>
  <a class="gh-link" href="https://github.com/wwwyo/tools" target="_blank" rel="noopener" aria-label="GitHub">
    <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
    </svg>
  </a>
</header>

<ul class="tool-list">
  <li>
    <a href="/plausible-texture/">
      <span class="no">No.001</span>
      <span class="name">薄っぺらな嘘 — Plausible Texture</span>
      <p class="desc">LLM っぽい定型句を検知して剥がす</p>
    </a>
  </li>
</ul>

</body>
</html>
